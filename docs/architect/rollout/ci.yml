name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ftl-content-agent

jobs:
  verify:
    name: Build, test, and verify agent-core pins
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ftl-content-agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify agent-core integration pins
        run: node scripts/verify-agent-core-pins.mjs

      - name: Run tests
        run: npm test
