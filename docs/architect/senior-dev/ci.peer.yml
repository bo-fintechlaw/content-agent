name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      REPO_AGENT_ID: cmo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Stage vendor pin manifest
        run: |
          mkdir -p vendor/ftl-agent-core
          cp docs/architect/rollout/ftl-agent-core.package.json vendor/ftl-agent-core/package.json

      - name: Verify agent-core pins (0.2.2)
        run: node scripts/verify-agent-core-pins.mjs
